<!DOCTYPE html>
<html>
<head>
<title>Login - SecureX</title>

<style>
body {
    margin:0;
    background:#020412;
    font-family:Segoe UI;
    overflow:hidden;
}

.grid {
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
    background-size:40px 40px;
    animation:move 10s linear infinite;
}

@keyframes move {
    from {background-position:0 0;}
    to {background-position:40px 40px;}
}

.scan {
    position:absolute;
    width:100%;
    height:2px;
    background:cyan;
    box-shadow:0 0 15px cyan;
    animation:scan 3s linear infinite;
}

@keyframes scan {
    from {top:0;}
    to {top:100%;}
}

.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.7);
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 20px cyan;
    color:cyan;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    background:#111;
    color:white;
}

button {
    width:100%;
    padding:12px;
    background:transparent;
    border:2px solid cyan;
    color:cyan;
    cursor:pointer;
}

button:hover {
    background:cyan;
    color:black;
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="scan"></div>

<div class="card">
    <h2>Login</h2>
    <form action="/login" method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>
</div>

</body>
</html>
